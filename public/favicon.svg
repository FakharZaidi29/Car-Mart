<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#f59e0b"/>

  <!-- Car silhouette -->
  <g fill="white" transform="translate(6, 10)">
    <!-- Car body -->
    <path d="M 4,28 L 4,22 Q 4,20 6,19 L 14,12 Q 16,10 19,10 L 33,10 Q 36,10 38,12 L 44,19 Q 46,20 46,22 L 46,28 Q 46,30 44,30 L 6,30 Q 4,30 4,28 Z" />
    <!-- Windshield cutout -->
    <path d="M 15,18 L 21,12 L 31,12 L 37,18 Z" fill="#f59e0b"/>
    <!-- Left wheel -->
    <circle cx="14" cy="30" r="6" fill="#f59e0b"/>
    <circle cx="14" cy="30" r="3.5" fill="white"/>
    <!-- Right wheel -->
    <circle cx="36" cy="30" r="6" fill="#f59e0b"/>
    <circle cx="36" cy="30" r="3.5" fill="white"/>
  </g>

  <!-- "CM" text at bottom -->
  <text x="32" y="58" font-family="Arial Black, Arial" font-weight="900" font-size="11" fill="white" text-anchor="middle" letter-spacing="1">CM</text>
</svg>
